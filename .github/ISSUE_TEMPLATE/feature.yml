name: Feature request
description: Propose a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / need
      description: What problem are we trying to solve?
      placeholder: Describe the need
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should be built?
      placeholder: Describe the feature
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope / notes
      description: Constraints, dependencies, edge cases
      placeholder: Optional notes
